name: Build TVLink Phone APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Android project structure
      run: |
        mkdir -p app/src/main/java/com/tvlink/phone
        mkdir -p app/src/main/res/layout

        cp phone_build.gradle.txt app/build.gradle
        cp phone_AndroidManifest.xml.txt app/src/main/AndroidManifest.xml
        cp phone_activity_main.xml.txt app/src/main/res/layout/activity_main.xml
        cp phone_MainActivity.kt-1.txt app/src/main/java/com/tvlink/phone/MainActivity.kt

    - name: Create root build.gradle
      run: |
        cat > build.gradle << 'EOF'
        buildscript {
            repositories {
                google()
                mavenCentral()
            }
            dependencies {
                classpath 'com.android.tools.build:gradle:8.2.0'
                classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.0'
            }
        }
        EOF

    - name: Create settings.gradle
      run: |
        cat > settings.gradle << 'EOF'
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        dependencyResolutionManagement {
            repositories {
                google()
                mavenCentral()
            }
        }
        rootProject.name = "TVLinkPhone"
        include ':app'
        EOF

    - name: Create gradle wrapper
      run: |
        cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
        distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip
        EOF

    - name: Make gradlew executable
      run: chmod +x gradlew || true

    - name: Build APK
      run: ./gradlew assembleDebug --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: TVLink-Phone-APK
        path: app/build/outputs/apk/debug/app-debug.apk
